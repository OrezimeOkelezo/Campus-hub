<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified - Student Connect</title>
    <link rel="stylesheet" href="css/confirm.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="confirm-container">
        <div class="confirm-card">
            <div class="icon-circle">
                <i class="fa-solid fa-check"></i>
            </div>

            <h1 class="confirm-title">Email Verified!</h1>
            <p class="confirm-text">
                Your email has been successfully verified. You can now access all the features of <strong>Student Connect</strong>.
            </p>

            <div class="action-area">
                <a href="sign.html" class="btn-primary">Continue to Login</a>
            </div>

            <div class="confirm-footer">
                <p>Welcome to the community!</p>
            </div>
        </div>
    </div>

</body>
</html>
