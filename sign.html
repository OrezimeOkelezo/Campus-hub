<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Login to Student Connect">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Connect - Login</title>
    
    <link rel="stylesheet" href="css/sign.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="login-section">
            <div class="form-wrapper">
                <h1>Login</h1>
                <p class="subtitle">Enter your account details</p>

                <form id="loginForm">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>

                    <div class="input-group">
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Password" required>
                            <span class="toggle-password" id="toggleBtn">👁️</span>
                        </div>
                    </div>

                    <a href="forget.html" class="forgot-link">Forgot Password?</a>
                    
                    <div id="error-box" style="color: #ff5e5e; font-size: 0.85rem; margin-bottom: 15px; display: none; background: rgba(255, 94, 94, 0.1); padding: 10px; border-radius: 8px; border: 1px solid #ff5e5e;"></div>

                    <button type="submit" class="login-btn" id="loginBtn">Login</button>
                </form>

                <div class="footer-links">
                    <span>Don't have an account?</span>
                    <a href="create.html">
                        <button type="button" class="signup-btn">Sign up</button>
                    </a>
                </div>
            </div>
        </div>

        <div class="welcome-section">
            <div class="content">
                <h2>Welcome to student portal</h2>
                <p>Login to access your account</p>
                <div class="illustration">
                    <img src="img/img2.png" alt="Illustration">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. INITIALIZE SUPABASE
        const SUPABASE_URL = 'https://nwhskxqwtpkuiwkcdols.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_tX-yn5PPUsrILFHsI5SALA__ovoxFje';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorBox = document.getElementById('error-box');
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggleBtn');

        // 2. SESSION CHECK: Redirect if already authenticated
        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                window.location.href = "home.html";
            }
        }
        checkSession();

        // 3. UI: Password Visibility Toggle
        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.textContent = isPassword ? '🙈' : '👁️';
        });

        // 4. AUTH: Login & Data Extraction
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const emailValue = document.getElementById('email').value.trim();
            const passwordValue = passwordInput.value;

            // Reset UI
            loginBtn.innerText = "Verifying...";
            loginBtn.disabled = true;
            errorBox.style.display = "none";

            // Attempt Sign In
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: emailValue,
                password: passwordValue,
            });

            if (error) {
                errorBox.innerText = error.message;
                errorBox.style.display = "block";
                loginBtn.innerText = "Login";
                loginBtn.disabled = false;
            } else {
                /* SUCCESS: DATA COLLECTION 
                   Pulling all relevant fields from the auth user object
                */
                const user = data.user;
                
                const loginData = {
                    uid: user.id,                      // Unique User ID
                    email: user.email,                // The Email you requested
                    name: user.user_metadata.full_name, // From your create.html data
                    avatar: user.user_metadata.avatar, // Null until updated
                    matric: user.user_metadata.matric_no
                };

                // For debugging: verify everything is collected
                console.log("Login Success for:", loginData.name);
                console.log("Saved Email:", loginData.email);

                // Proceed to the home page
                window.location.href = "home.html";
            }
        });
    </script>
</body>
</html>
