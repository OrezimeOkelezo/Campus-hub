<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <meta name="description" content="Login to your account to continue">
    
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Connect - Login</title>
    <link rel="stylesheet" href="css/sign.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="login-section">
            <div class="form-wrapper">
                <h1>Login</h1>
                <p class="subtitle">Enter your account details</p>

                <form>
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>

                    <div class="input-group">
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Password" required>
                            <span class="toggle-password" id="toggleBtn">👁️</span>
                        </div>
                    </div>

                    <a href="forget.html" class="forgot-link">Forgot Password?</a>

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <div class="footer-links">
    <span>Don't have an account?</span>
    <a href="create.html">
        <button type="button" class="signup-btn">Sign up</button>
    </a>
</div>

            </div>
        </div>

        <div class="welcome-section">
            <div class="content">
                <h2>Welcome to student portal</h2>
                <p>Login to access your account</p>
                <div class="illustration">
                    <img src="img/img2.png" alt="Illustration">
                </div>
            </div>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('toggleBtn');
        const passwordInput = document.getElementById('password');

        toggleBtn.addEventListener('click', () => {
            // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle the icon/emoji
            toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
        });
    </script>
</body>
</html>
