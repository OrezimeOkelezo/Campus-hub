<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Student Connect</title>
    <link rel="stylesheet" href="css/setting.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Drawer and Layout consistency */
        .side-panel {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: #121212; z-index: 4000; transition: 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        .side-panel.active { right: 0; }
        .close-drawer {
            position: absolute; top: 20px; left: 20px;
            font-size: 1.4rem; color: white; cursor: pointer; z-index: 4001;
        }
        .profile-card { text-align: center; padding: 50px 10px 20px; }
        .profile-img {
            width: 85px; height: 85px; border-radius: 50%;
            object-fit: cover; border: 3px solid #a881ff;
            margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto;
        }

        /* Success Toast Notification */
        #toast {
            visibility: hidden; min-width: 250px; background-color: #4caf50;
            color: #fff; text-align: center; border-radius: 8px;
            padding: 16px; position: fixed; z-index: 6000;
            left: 50%; bottom: 30px; transform: translateX(-50%);
            font-size: 0.9rem; font-weight: 600;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* Modal Styles */
        .modal { 
            display: none; position: fixed; z-index: 5000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; 
        }
        .modal.show { display: flex; }
        .modal-content { 
            background: #1a1a1a; padding: 25px; border-radius: 15px; 
            width: 90%; max-width: 400px; border: 1px solid #2a2a2a; color: white;
        }
        .modal-content input, .modal-content textarea { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            background: #252525; border: 1px solid #333; 
            border-radius: 8px; color: white; box-sizing: border-box;
            font-family: inherit;
        }
        
        .save-btn { background: #a881ff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
        .cancel-btn { background: transparent; color: #888; border: none; padding: 10px; cursor: pointer; width: 100%; margin-top: 5px; }
        .header-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="toast">Profile updated successfully!</div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Update Profile</h3>
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">Full Name</p>
            <input type="text" id="newName" placeholder="Full Name">
            
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">Bio</p>
            <textarea id="newBio" placeholder="Tell the community about yourself..." style="width: 100%; height: 100px; background: #252525; border: 1px solid #333; border-radius: 8px; color: white; padding: 12px; font-family: inherit; resize: none;"></textarea>
            
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">Profile Picture</p>
            <input type="file" id="avatarFile" accept="image/*" style="font-size: 0.8rem; margin-bottom: 20px;">
            
            <button class="save-btn" id="saveProfileBtn" onclick="handleSave()">Save Changes</button>
            <button class="cancel-btn" onclick="closeAllModals()">Cancel</button>
        </div>
    </div>

    <header class="top-nav">
        <div class="nav-left">
            <a href="home.html" style="color:white;"><i class="fa-solid fa-arrow-left"></i></a>
            <h2 style="margin-left: 15px;">Settings</h2>
        </div>
        <div class="nav-right">
            <div id="menuToggle" style="cursor: pointer;"><i class="fa-solid fa-bars"></i></div>
        </div>
    </header>

    <div class="app-layout">
        <main class="settings-container">
            <div class="user-profile-header">
                <div class="profile-text">
                    <h1 id="displayUsername">Loading...</h1>
                    <a href="#" class="edit-link" id="openEdit">Edit name, bio & avatar</a>
                </div>
                <img id="displayAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="header-avatar">
            </div>

            <div class="settings-list">
                <div class="settings-item" onclick="goToMyProfile()">
                    <span>View profile</span>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="settings-item">
                    <span>Account Security</span>
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div class="settings-item" onclick="window.location.href='terms.html'">
                    <span>Terms of service</span>
                    <i class="fa-solid fa-file-contract"></i>
                </div>
                <div class="settings-item" onclick="window.location.href='private.html'">
                    <span>Privacy policy</span>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="settings-item" onclick="window.location.href='about.html'">
                    <span>About</span>
                    <i class="fa-solid fa-circle-info"></i>
                </div>
                <div class="settings-item" id="logoutTrigger" style="color: #ff5e5e; border-bottom: none;">
                    <span>Log out</span>
                    <i class="fa-solid fa-right-from-bracket"></i>
                </div>
            </div>
        </main>

        <aside class="side-panel" id="sidePanel">
            <i class="fa-solid fa-xmark close-drawer" id="closeDrawer"></i>
            <div class="cover-photo"></div>
            <div class="profile-card">
                <img id="sideAvatar" class="profile-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <h3 id="sideName">Username</h3>
                <p id="sideEmail">email@email.com</p>
            </div>
            <nav class="menu">
                <a href="home.html"><i class="fa-solid fa-house"></i> Home</a>
                <a href="cpost.html"><i class="fa-solid fa-pen-to-square"></i> My Post</a>
                <a href="notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a>
                <a href="setting.html" class="active-link"><i class="fa-solid fa-gear"></i> Settings</a>
                <a href="#" id="sideLogout" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </nav>
        </aside>
    </div>

    <script>
        const SUPABASE_URL = 'https://nwhskxqwtpkuiwkcdols.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_tX-yn5PPUsrILFHsI5SALA__ovoxFje';
        const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser;

        async function init() {
            const { data: { user } } = await supa.auth.getUser();
            if (!user) return window.location.href = "sign.html";
            currentUser = user;

            const { data: profile } = await supa.from('profiles').select('*').eq('id', user.id).single();

            const name = profile?.full_name || user.user_metadata?.full_name || "Student";
            const avatar = profile?.avatar_url || user.user_metadata?.avatar_url || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

            document.getElementById("displayUsername").innerText = name;
            document.getElementById("displayAvatar").src = avatar;
            document.getElementById("sideName").innerText = name;
            document.getElementById("sideEmail").innerText = user.email;
            document.getElementById("sideAvatar").src = avatar;
            
            document.getElementById("newName").value = name;
            document.getElementById("newBio").value = profile?.bio || "";
            
            setupDrawer();
        }

        function goToMyProfile() {
            if (currentUser) window.location.href = `profile.html?uid=${currentUser.id}`;
        }

        function showToast() {
            const x = document.getElementById("toast");
            x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        function closeAllModals() { document.getElementById("editModal").classList.remove("show"); }
        document.getElementById("openEdit").onclick = () => document.getElementById("editModal").classList.add("show");

        async function handleSave() {
            const btn = document.getElementById("saveProfileBtn");
            const name = document.getElementById("newName").value.trim();
            const bio = document.getElementById("newBio").value.trim();
            const file = document.getElementById("avatarFile").files[0];

            if(!name) return alert("Name is required");
            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                let avatarUrl = currentUser.user_metadata?.avatar_url;

                if (file) {
                    const fileName = `avatars/${currentUser.id}-${Date.now()}.jpg`;
                    const { error: uploadError } = await supa.storage.from('post_images').upload(fileName, file);
                    if (uploadError) throw uploadError;
                    avatarUrl = supa.storage.from('post_images').getPublicUrl(fileName).data.publicUrl;
                }

                await supa.auth.updateUser({ data: { full_name: name, avatar_url: avatarUrl } });
                await supa.from('profiles').upsert({ id: currentUser.id, full_name: name, avatar_url: avatarUrl, bio: bio });

                closeAllModals();
                showToast();
                
                // Update local UI
                document.getElementById("displayUsername").innerText = name;
                document.getElementById("displayAvatar").src = avatarUrl;
                document.getElementById("sideName").innerText = name;
                document.getElementById("sideAvatar").src = avatarUrl;
                
                btn.innerText = "Save Changes";
                btn.disabled = false;
            } catch (err) {
                alert(err.message);
                btn.innerText = "Save Changes";
                btn.disabled = false;
            }
        }

        function setupDrawer() {
            const menuToggle = document.getElementById("menuToggle");
            const closeDrawer = document.getElementById("closeDrawer");
            const panel = document.getElementById("sidePanel");

            menuToggle.onclick = e => { e.stopPropagation(); panel.classList.add("active"); };
            closeDrawer.onclick = () => panel.classList.remove("active");
            document.onclick = e => { if (!panel.contains(e.target) && !menuToggle.contains(e.target)) panel.classList.remove("active"); };
        }

        const logout = async () => { await supa.auth.signOut(); window.location.href = "sign.html"; };
        document.getElementById("logoutTrigger").onclick = logout;
        document.getElementById("sideLogout").onclick = logout;

        window.onload = init;
    </script>
</body>
</html>
