<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Student Connect</title>
    <link rel="stylesheet" href="css/setting.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Drawer-specific styles removed */
        
        #toast {
            visibility: hidden; min-width: 250px; background-color: #4caf50;
            color: #fff; text-align: center; border-radius: 8px;
            padding: 16px; position: fixed; z-index: 6000;
            left: 50%; bottom: 30px; transform: translateX(-50%);
            font-size: 0.9rem; font-weight: 600;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .modal { 
            display: none; position: fixed; z-index: 5000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; 
        }
        .modal.show { display: flex; }
        .modal-content { 
            background: #1a1a1a; padding: 25px; border-radius: 15px; 
            width: 90%; max-width: 400px; border: 1px solid #2a2a2a; color: white;
            max-height: 90vh; overflow-y: auto;
        }
        .modal-content input, .modal-content textarea { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            background: #252525; border: 1px solid #333; 
            border-radius: 8px; color: white; box-sizing: border-box; font-family: inherit;
        }
        
        .save-btn { background: #a881ff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
        .cancel-btn { background: transparent; color: #888; border: none; padding: 10px; cursor: pointer; width: 100%; margin-top: 5px; }
        .logout-confirm-btn { background: #ff5e5e; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
        .header-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .input-label { font-size: 0.75rem; color: #a881ff; margin-bottom: 4px; display: block; font-weight: 600; }
    </style>
</head>
<body>

    <div id="toast">Profile updated successfully!</div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Update Profile</h3>
            
            <label class="input-label">Full Name</label>
            <input type="text" id="newName" placeholder="Full Name">
            
            <label class="input-label">Matric Number</label>
            <input type="text" id="newMatric" placeholder="e.g. UG/2024/1234">

            <label class="input-label">Admission Year</label>
            <input type="number" id="newYear" placeholder="e.g. 2024">
            
            <label class="input-label">Bio</label>
            <textarea id="newBio" placeholder="Tell the community about yourself..." style="height: 80px; resize: none;"></textarea>
            
            <label class="input-label">Profile Picture</label>
            <input type="file" id="avatarFile" accept="image/*">
            
            <button class="save-btn" id="saveProfileBtn">Save Changes</button>
            <button class="cancel-btn" onclick="closeAllModals()">Cancel</button>
        </div>
    </div>

    <div id="logoutModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <i class="fa-solid fa-right-from-bracket" style="font-size: 2rem; color: #ff5e5e; margin-bottom: 15px;"></i>
            <h3>Logout?</h3>
            <p style="color: #888; margin-bottom: 20px;">Are you sure you want to log out of your account?</p>
            <button class="logout-confirm-btn" id="confirmLogout">Yes, Logout</button>
            <button class="cancel-btn" onclick="closeAllModals()">Cancel</button>
        </div>
    </div>

    <header class="top-nav">
        <div class="nav-left">
            <a href="home.html" style="color:white;"><i class="fa-solid fa-arrow-left"></i></a>
            <h2 style="margin-left: 15px;">Settings</h2>
        </div>
        <div class="nav-right"></div>
    </header>

    <div class="app-layout">
        <main class="settings-container">
            <div class="user-profile-header">
                <div class="profile-text">
                    <h1 id="displayUsername">Loading...</h1>
                    <p id="displayMatric" style="color: #888; font-size: 0.9rem; margin-top: -5px;"></p>
                    <a href="#" class="edit-link" id="openEdit">Edit name, bio & avatar</a>
                </div>
                <img id="displayAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="header-avatar">
            </div>

            <div class="settings-list">
                <div class="settings-item" onclick="goToMyProfile()">
                    <span>View profile</span>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="settings-item" onclick="window.location.href='notice.html'">
                    <span>Notifications</span>
                    <i class="fa-solid fa-bell"></i>
                </div>
                <div class="settings-item">
                    <span>Account Security</span>
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div class="settings-item" onclick="window.location.href='terms.html'">
                    <span>Terms of service</span>
                    <i class="fa-solid fa-file-contract"></i>
                </div>
                <div class="settings-item" onclick="window.location.href='private.html'">
                    <span>Privacy policy</span>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="settings-item" onclick="window.location.href='about.html'">
                    <span>About</span>
                    <i class="fa-solid fa-circle-info"></i>
                </div>
                <div class="settings-item" id="logoutTrigger" style="color: #ff5e5e; border-bottom: none;">
                    <span>Log out</span>
                    <i class="fa-solid fa-right-from-bracket"></i>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://nwhskxqwtpkuiwkcdols.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_tX-yn5PPUsrILFHsI5SALA__ovoxFje';
        const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DEFAULT_AVATAR = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        let currentUser;
        let currentProfileData = {};

        async function init() {
            const { data: { user } } = await supa.auth.getUser();
            if (!user) return window.location.href = "sign.html";
            currentUser = user;

            const { data: profile } = await supa.from('profiles').select('*').eq('id', user.id).single();
            currentProfileData = profile || {};

            const name = currentProfileData.full_name || user.user_metadata?.full_name || "Student";
            const avatar = currentProfileData.avatar_url || user.user_metadata?.avatar_url || DEFAULT_AVATAR;
            const matric = currentProfileData.matric_no || "No Matric No.";

            document.getElementById("displayUsername").innerText = name;
            document.getElementById("displayAvatar").src = avatar;
            document.getElementById("displayMatric").innerText = matric;
            
            document.getElementById("newName").value = name;
            document.getElementById("newBio").value = currentProfileData.bio || "";
            document.getElementById("newMatric").value = currentProfileData.matric_no || "";
            document.getElementById("newYear").value = currentProfileData.admission_year || "";
        }

        async function handleSave() {
            const btn = document.getElementById("saveProfileBtn");
            const name = document.getElementById("newName").value.trim();
            const bio = document.getElementById("newBio").value.trim();
            const matric = document.getElementById("newMatric").value.trim();
            const year = document.getElementById("newYear").value;
            const file = document.getElementById("avatarFile").files[0];

            if(!name) return alert("Name is required");
            btn.innerText = "Saving...";
            btn.disabled = true;

            try {
                let avatarUrl = currentProfileData.avatar_url || DEFAULT_AVATAR;

                if (file) {
                    const fileName = `${currentUser.id}-${Date.now()}.jpg`;
                    await supa.storage.from('post_images').upload(`avatars/${fileName}`, file);
                    avatarUrl = supa.storage.from('post_images').getPublicUrl(`avatars/${fileName}`).data.publicUrl;
                }

                const { error: dbError } = await supa.from('profiles').update({ 
                    full_name: name, 
                    avatar_url: avatarUrl, 
                    bio: bio,
                    matric_no: matric,
                    admission_year: year ? parseInt(year) : null
                }).eq('id', currentUser.id);

                if (dbError) throw dbError;

                await supa.auth.updateUser({ 
                    data: { full_name: name, avatar_url: avatarUrl } 
                });

                closeAllModals();
                showToast();
                setTimeout(() => location.reload(), 1500); 
            } catch (err) {
                alert(err.message);
                btn.innerText = "Save Changes";
                btn.disabled = false;
            }
        }

        function goToMyProfile() {
            if (currentUser) {
                localStorage.setItem("viewProfileUid", currentUser.id);
                window.location.href = `profile.html`;
            }
        }

        function showToast() {
            const x = document.getElementById("toast");
            x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        function closeAllModals() { 
            document.getElementById("editModal").classList.remove("show"); 
            document.getElementById("logoutModal").classList.remove("show"); 
        }

        // Open Edit Profile
        document.getElementById("openEdit").onclick = () => document.getElementById("editModal").classList.add("show");
        
        // Open Logout Modal
        document.getElementById("logoutTrigger").onclick = () => document.getElementById("logoutModal").classList.add("show");

        document.getElementById("saveProfileBtn").onclick = handleSave;

        // Confirm Logout Logic
        document.getElementById("confirmLogout").onclick = async () => { 
            await supa.auth.signOut(); 
            window.location.href = "sign.html"; 
        };

        window.onload = init;
    </script>
</body>
</html>
