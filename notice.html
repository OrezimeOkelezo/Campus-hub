<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Student Connect</title>
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/notice.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="top-nav">
        <div class="header-inner">
            <div class="nav-left">
                <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
                <h2>Notifications</h2>
            </div>
            <div class="nav-right">
                <div class="sort-wrapper">
                    <i class="fa-solid fa-arrow-up-wide-short" id="sortBtn"></i>
                    <div class="sort-dropdown" id="sortDropdown">
                        <a href="#" onclick="fetchNotifications('all')">All Notifications</a>
                        <a href="#" onclick="fetchNotifications('like')"><i class="fa-solid fa-heart"></i> Reactions</a>
                        <a href="#" onclick="fetchNotifications('comment')"><i class="fa-solid fa-comment"></i> Comments</a>
                    </div>
                </div>
                </div>
        </div>
    </header>

    <div class="app-layout">
        <main class="feed-container" id="noticeFeed">
            <div class="loading-state">Fetching your alerts...</div>
        </main>
        </div>

    <script>
        const SUPABASE_URL = 'https://nwhskxqwtpkuiwkcdols.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_tX-yn5PPUsrILFHsI5SALA__ovoxFje';
        const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser;

        async function init() {
            const { data: { user } } = await supa.auth.getUser();
            if (!user) return window.location.href = "sign.html";
            currentUser = user;

            fetchNotifications();
            setupUI();
        }

        async function fetchNotifications(filter = 'all') {
            const feed = document.getElementById("noticeFeed");
            
            let query = supa
                .from('notifications')
                .select(`*, profiles:sender_id(full_name, avatar_url)`)
                .eq('receiver_id', currentUser.id)
                .order('created_at', { ascending: false });

            if (filter !== 'all') {
                query = query.eq('type', filter);
            }

            const { data, error } = await query;

            if (error) {
                feed.innerHTML = `<p class="empty-msg">Error loading notifications.</p>`;
                return;
            }

            if (data.length === 0) {
                feed.innerHTML = `<p class="empty-msg">No ${filter === 'all' ? '' : filter} notifications found.</p>`;
                return;
            }

            feed.innerHTML = data.map(n => `
                <div class="notification-item ${n.is_read ? '' : 'unread'}" onclick="markAsRead(${n.id})">
                    <img src="${n.profiles.avatar_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="notice-avatar">
                    <div class="notice-content">
                        <p><strong>${n.profiles.full_name}</strong> ${getNoticeMessage(n.type)}</p>
                        <span class="notice-time">${timeAgo(n.created_at)}</span>
                    </div>
                    ${!n.is_read ? '<div class="unread-dot"></div>' : ''}
                </div>
            `).join('');
        }

        function getNoticeMessage(type) {
            switch(type) {
                case 'like': return "reacted to your post ❤️";
                case 'comment': return "commented on your post 💬";
                case 'dislike': return "disliked your post 👎";
                default: return "interacted with you.";
            }
        }

        async function markAsRead(id) {
            await supa.from('notifications').update({ is_read: true }).eq('id', id);
        }

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - new Date(date)) / 1000);
            if (seconds < 60) return "Just now";
            const i = Math.floor(seconds / 60);
            if (i < 60) return i + "m ago";
            const h = Math.floor(i / 60);
            if (h < 24) return h + "h ago";
            return new Date(date).toLocaleDateString();
        }

        function setupUI() {
            document.getElementById('sortBtn').onclick = (e) => {
                e.stopPropagation();
                document.getElementById('sortDropdown').classList.toggle('active');
            };

            // Sidebar toggle logic removed

            document.onclick = () => {
                document.getElementById('sortDropdown').classList.remove('active');
            };
        }

        window.onload = init;
    </script>
</body>
</html>
