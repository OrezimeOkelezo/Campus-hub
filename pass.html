<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Student Connect</title>
    <link rel="stylesheet" href="css/sign.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="login-section">
            <div class="form-wrapper">
                <h1>Reset Password</h1>
                <p class="subtitle">Enter your new secure password below</p>

                <form id="updatePasswordForm">
                    <div class="input-group">
                        <div class="password-wrapper">
                            <input type="password" id="newPassword" placeholder="New Password" required minlength="6">
                            <span class="toggle-password" onclick="toggleVisibility('newPassword', this)">👁️</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
                            <span class="toggle-password" onclick="toggleVisibility('confirmPassword', this)">👁️</span>
                        </div>
                    </div>

                    <div id="statusMsg" style="display:none; font-size:0.85rem; margin-bottom:15px;"></div>

                    <button type="submit" class="login-btn" id="confirmBtn">Confirm Reset</button>
                </form>
            </div>
        </div>

        <div class="welcome-section">
            <div class="content">
                <h2>Security First</h2>
                <p>Ensure your new password is strong and easy for you to remember.</p>
                <div class="illustration">
                    <img src="img/img2.png" alt="Reset Illustration">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. INITIALIZE SUPABASE
        const _supabase = supabase.createClient(
            'https://nwhskxqwtpkuiwkcdols.supabase.co', 
            'sb_publishable_tX-yn5PPUsrILFHsI5SALA__ovoxFje'
        );

        const updateForm = document.getElementById('updatePasswordForm');
        const confirmBtn = document.getElementById('confirmBtn');
        const statusMsg = document.getElementById('statusMsg');

        // Toggle Password Visibility Function
        function toggleVisibility(inputId, element) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
            element.textContent = input.type === "password" ? "👁️" : "🙈";
        }

        // 2. UPDATE PASSWORD LOGIC
        updateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Basic validation
            if (newPassword !== confirmPassword) {
                statusMsg.innerText = "Passwords do not match!";
                statusMsg.style.color = "#ff5e5e";
                statusMsg.style.display = "block";
                return;
            }

            confirmBtn.innerText = "Updating...";
            confirmBtn.disabled = true;

            // Supabase password update
            const { data, error } = await _supabase.auth.updateUser({
                password: newPassword
            });

            if (error) {
                statusMsg.innerText = "Error: " + error.message;
                statusMsg.style.color = "#ff5e5e";
                statusMsg.style.display = "block";
                confirmBtn.innerText = "Confirm Reset";
                confirmBtn.disabled = false;
            } else {
                statusMsg.innerText = "Password updated! Redirecting to login...";
                statusMsg.style.color = "#00c853";
                statusMsg.style.display = "block";
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = "sign.html";
                }, 2000);
            }
        });
    </script>
</body>
</html>
