<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home - Student Connect</title>

<link rel="stylesheet" href="css/home.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- HEADER -->
<header class="top-nav">
    <div class="header-inner">

        <div class="nav-left">
            <h2 id="displayGreeting">Hi, Student</h2>
        </div>

        <div class="nav-right">
            <a href="search.html" class="icon-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </a>

            <div class="icon-btn" id="menuToggle">
                <i class="fa-solid fa-bars"></i>
            </div>
        </div>

    </div>
</header>

<div class="app-layout">

    <!-- FEED -->
    <main class="feed-container" id="feedContainer">
        <div class="feed-status">Loading your community...</div>
    </main>

    <!-- SIDE PANEL -->
    <aside class="side-panel" id="sidePanel">

        <div class="cover-photo"></div>

        <div class="profile-card">
            <img id="sideAvatar" class="profile-img">
            <h3 id="sideName">Student</h3>
            <p id="sideEmail">student@email.com</p>
        </div>

        <nav class="menu">
            <a href="home.html" class="active-link"><i class="fa-solid fa-house"></i> Home</a>
            <a href="cpost.html"><i class="fa-solid fa-pen-to-square"></i> My Post</a>
            <a href="setting.html"><i class="fa-solid fa-gear"></i> Settings</a>
            <a href="#"><i class="fa-solid fa-message"></i> Messages</a>
            <a href="#" id="logoutTrigger" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>

    </aside>

</div>

<!-- LOGOUT MODAL -->
<div id="logoutModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Logout?</h3>
        <p>Are you sure you want to leave?</p>

        <div class="modal-actions">
            <button id="cancelLogout">Cancel</button>
            <button id="confirmLogout">Logout</button>
        </div>
    </div>
</div>

<a href="cpost.html" class="mobile-fab">
    <i class="fa-solid fa-plus"></i>
</a>

<script>
const supa = supabase.createClient(
'https://nwhskxqwtpkuiwkcdols.supabase.co',
'sb_publishable_tX-yn5PPUsrILFHsI5SALA__ovoxFje'
);

/* ================= INIT ================= */
async function init() {
    const { data: { user } } = await supa.auth.getUser();

    if (!user) {
        window.location.href = "sign.html";
        return;
    }

    const name = user.user_metadata.full_name || "Student";

    document.getElementById("displayGreeting").innerText = "Hi, " + name.split(" ")[0];
    document.getElementById("sideName").innerText = name;
    document.getElementById("sideEmail").innerText = user.email;
    document.getElementById("sideAvatar").src =
        user.user_metadata.avatar || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    loadPosts();
}

/* ================= LOAD POSTS ================= */
async function loadPosts() {
    const container = document.getElementById("feedContainer");

    const { data: posts, error } = await supa
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        container.innerHTML = `<div class="feed-status">Error loading posts</div>`;
        return;
    }

    container.innerHTML = "";

    posts.forEach(post => {

        const images = [post.img1, post.img2, post.img3, post.img4].filter(Boolean);
        let gridClass = images.length > 1 ? `grid-${images.length}` : "";

        const div = document.createElement("div");
        div.className = "post";

        /* CLICK EVENT */
        div.onclick = () => {
            const postData = {
                id: post.id,
                uid: post.uid,
                author_name: post.author_name,
                author_avatar: post.author_avatar,
                text: post.text,
                img1: post.img1,
                img2: post.img2,
                img3: post.img3,
                img4: post.img4,
                like: post.like,
                dislike: post.dislike,
                comment: post.comment,
                views: post.views,
                created_at: post.created_at
            };

            localStorage.setItem("selectedPost", JSON.stringify(postData));
            window.location.href = "post.html";
        };

        div.innerHTML = `
            <img src="${post.author_avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="avatar">

            <div class="post-body">
                <div class="post-header">
                    <span class="name">${post.author_name}</span>
                    <span class="meta">@student • ${timeAgo(post.created_at)}</span>
                </div>

                <div class="views">
                    <i class="fa-regular fa-eye"></i> ${post.views || 0} views
                </div>

                <p>${post.text || ""}</p>

                ${images.length ? `
                <div class="media-grid ${gridClass}">
                    ${images.map(img => `<img src="${img}">`).join("")}
                </div>` : ""}

                <div class="actions">
                    <span><i class="fa-regular fa-thumbs-up"></i> ${post.like || 0}</span>
                    <span><i class="fa-regular fa-thumbs-down"></i> ${post.dislike || 0}</span>
                    <span><i class="fa-regular fa-comment"></i> ${post.comment || 0}</span>
                </div>
            </div>
        `;

        container.appendChild(div);
    });
}

/* ================= TIME FORMAT ================= */
function timeAgo(date) {
    const diff = Math.floor((new Date() - new Date(date)) / 60000);
    return diff < 60 ? diff + "m" : Math.floor(diff / 60) + "h";
}

/* ================= MENU + MODAL ================= */
const menu = document.getElementById("menuToggle");
const panel = document.getElementById("sidePanel");
const modal = document.getElementById("logoutModal");

menu.onclick = e => {
    e.stopPropagation();
    panel.classList.toggle("active");
};

document.onclick = e => {
    if (!panel.contains(e.target) && !menu.contains(e.target)) {
        panel.classList.remove("active");
    }
};

document.getElementById("logoutTrigger").onclick = e => {
    e.preventDefault();
    modal.classList.add("show");
};

document.getElementById("cancelLogout").onclick = () => modal.classList.remove("show");

document.getElementById("confirmLogout").onclick = async () => {
    await supa.auth.signOut();
    window.location.href = "sign.html";
};

/* START */
init();
</script>

</body>
</html>
