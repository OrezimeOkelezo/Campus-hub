<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Student Connect</title>
    <link rel="stylesheet" href="css/sign.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="login-section">
            <div class="form-wrapper">
                <h1>Reset Password</h1>
                <p class="subtitle">Enter your new secure password below</p>

                <form id="updatePasswordForm">
                    <div class="input-group">
                        <div class="password-wrapper">
                            <input type="password" id="newPassword" placeholder="New Password" required minlength="6">
                            <span class="toggle-password" onclick="toggleVisibility('newPassword', this)">👁️</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
                            <span class="toggle-password" onclick="toggleVisibility('confirmPassword', this)">👁️</span>
                        </div>
                    </div>

                    <div id="statusMsg" style="display:none; font-size:0.85rem; margin-bottom:15px;"></div>

                    <button type="submit" class="login-btn" id="confirmBtn">Confirm Reset</button>
                </form>
            </div>
        </div>

        <div class="welcome-section">
            <div class="content">
                <h2>Security First</h2>
                <p>Ensure your new password is strong and easy for you to remember.</p>
                <div class="illustration">
                    <img src="img/img2.png" alt="Reset Illustration">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. INITIALIZE SUPABASE
        const _supabase = supabase.createClient(
            'https://nwhskxqwtpkuiwkcdols.supabase.co', 
            'sb_publishable_tX-yn5PPUsrILFHsI5SALA__ovoxFje'
        );

        const updateForm = document.getElementById('updatePasswordForm');
        const confirmBtn = document.getElementById('confirmBtn');
        const statusMsg = document.getElementById('statusMsg');

        // Toggle Password Visibility Function
        function toggleVisibility(inputId, element) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
            element.textContent = input.type === "password" ? "👁️" : "🙈";
        }

        // Helper to show messages
        function showStatus(text, isError = true) {
            statusMsg.innerText = text;
            statusMsg.style.color = isError ? "#ff5e5e" : "#00c853";
            statusMsg.style.display = "block";
        }

        // 2. SESSION VALIDATION
        // This checks if the access_token in your URL is valid when the page loads
        window.onload = async () => {
            const { data: { session }, error } = await _supabase.auth.getSession();
            if (error || !session) {
                showStatus("Invalid or expired reset link. Please request a new one.");
                confirmBtn.disabled = true;
                confirmBtn.style.opacity = "0.5";
            }
        };

        // 3. UPDATE PASSWORD LOGIC
        updateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showStatus("Passwords do not match!");
                return;
            }

            confirmBtn.innerText = "Updating...";
            confirmBtn.disabled = true;

            // Update user password using the session from the URL
            const { error } = await _supabase.auth.updateUser({
                password: newPassword
            });

            if (error) {
                showStatus("Error: " + error.message);
                confirmBtn.innerText = "Confirm Reset";
                confirmBtn.disabled = false;
            } else {
                showStatus("Password updated! Redirecting to login...", false);
                
                // Sign out to clear the recovery session
                await _supabase.auth.signOut();

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);
            }
        });
    </script>
</body>
</html>
