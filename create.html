<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Connect - Create Account</title>
    <link rel="stylesheet" href="css/create.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="login-section">
            <div class="form-wrapper">
                <h1>Create Account</h1>
                <p class="subtitle">Join the student portal today</p>

                <form id="registerForm">
                    <div class="input-group">
                        <input type="text" id="name" placeholder="Full Name" required>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>

                    <div class="input-group">
                        <input type="number" id="matricNo" placeholder="Matric No" required>
                    </div>

                    <div class="input-group">
                        <input type="number" id="year" placeholder="Year of Admission" min="2000" max="2026" required>
                    </div>

                    <div class="input-group">
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Password" required>
                            <span class="toggle-password" onclick="toggleVisibility('password', this)">👁️</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                            <span class="toggle-password" onclick="toggleVisibility('confirmPassword', this)">👁️</span>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">Sign Up</button>
                </form>

                <div class="footer-links">
                    <span>Already have an account?</span>
                    <a href="sign.html" style="text-decoration: none;"><button class="signup-btn">Login</button></a>
                </div>
            </div>
        </div>

        <div class="welcome-section">
            <div class="content">
                <h2>Join the community</h2>
                <p>Register to manage your academic journey with ease.</p>
                <div class="illustration">
                    <img src="img/img.png" alt="Illustration">
                </div>
            </div>
        </div>
    </div>

    <script>
        // Function to toggle password visibility
        function toggleVisibility(inputId, element) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                element.textContent = "🙈";
            } else {
                input.type = "password";
                element.textContent = "👁️";
            }
        }

        // Basic validation for matching passwords
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (pass !== confirmPass) {
                e.preventDefault();
                alert("Passwords do not match!");
            }
        });
    </script>
</body>
</html>
