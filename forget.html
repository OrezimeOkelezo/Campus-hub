<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Connect - Forgotten Password</title>
    <link rel="stylesheet" href="css/sign.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="login-section">
            <div class="form-wrapper">
                <h1>Forgotten Password</h1>
                <p class="subtitle">Enter your details to verify your account</p>

                <form id="resetForm">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>

                    <div class="input-group">
                        <div class="matric">
                            <input type="text" id="matricNo" placeholder="Matric No" required>
                        </div>
                    </div>

                    <div id="statusBox" style="display:none; font-size:0.85rem; margin-bottom:10px; padding:8px; border-radius:5px;"></div>

                    <a href="login.html" class="forgot-link">Remembered Password?</a>

                    <button type="submit" class="login-btn" id="resetBtn">Request Link</button>
                </form>

                <div class="footer-links">
                    <span>Don't have an account?</span>
                    <a href="create.html">
                        <button type="button" class="signup-btn">Sign up</button>
                    </a>
                </div>
            </div>
        </div>

        <div class="welcome-section">
            <div class="content">
                <h2>Forgotten your password</h2>
                <p>Request for a reset link to gain access again</p>
                <div class="illustration">
                    <img src="img/img1.png" alt="Illustration">
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://nwhskxqwtpkuiwkcdols.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_tX-yn5PPUsrILFHsI5SALA__ovoxFje';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const resetForm = document.getElementById('resetForm');
        const resetBtn = document.getElementById('resetBtn');
        const statusBox = document.getElementById('statusBox');

        function updateStatus(msg, isError = true) {
            statusBox.innerText = msg;
            statusBox.style.display = "block";
            statusBox.style.backgroundColor = isError ? "rgba(255,0,0,0.1)" : "rgba(0,255,0,0.1)";
            statusBox.style.color = isError ? "#ff4d4d" : "#2ecc71";
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const matric = document.getElementById('matricNo').value.trim();

            resetBtn.innerText = "Verifying...";
            resetBtn.disabled = true;
            statusBox.style.display = "none";

            try {
                // 1. CHECK IF EMAIL & MATRIC EXIST IN DATABASE
                // Note: Ensure your table is named 'profiles' and columns match
                const { data: profile, error: queryError } = await _supabase
                    .from('profiles') 
                    .select('email')
                    .eq('email', email)
                    .eq('matric_no', matric)
                    .maybeSingle();

                if (queryError) throw queryError;

                if (!profile) {
                    throw new Error("No matching account found with these details.");
                }

                // 2. IF FOUND, SEND RESET LINK
                resetBtn.innerText = "Sending Link...";
                const { error: resetError } = await _supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/pass.html',
                });

                if (resetError) throw resetError;

                updateStatus("Success! Reset link sent to your email.", false);
                resetBtn.innerText = "Link Sent ✅";

            } catch (err) {
                updateStatus(err.message);
                resetBtn.innerText = "Request Link";
                resetBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
