<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Connect - Forgotten Password </title>
    <link rel="stylesheet" href="css/sign.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="login-section">
            <div class="form-wrapper">
                <h1>Forgotten Password</h1>
                <p class="subtitle">Enter your account details</p>

                <form>
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>

                    <div class="input-group">
                        <div class="matric">
                            <input type="number" id="password" placeholder="Matric No" required>
                        </div>
                    </div>

                    <a href="sign.html" class="forgot-link">Remembered Password?</a>

                    <button type="submit" class="login-btn">Request Code</button>
                </form>

                <div class="footer-links">
    <span>Don't have an account?</span>
    <a href="create.html">
        <button type="button" class="signup-btn">Sign up</button>
    </a>
</div>

            </div>
        </div>

        <div class="welcome-section">
            <div class="content">
                <h2>Forgotten your password </h2>
                <p>Request for code to gain access again</p>
                <div class="illustration">
                    <img src="img/img1.png" alt="Illustration">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
